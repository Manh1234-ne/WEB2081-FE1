<h2>Signup</h2>

<div class="form-card">
    <form [formGroup]="Signup" (ngSubmit)="submitForm()">
        <div class="form-row">
            <label>Tên</label>
            <input type="text" formControlName="username" />
            @if (username?.invalid && username?.touched) {
            <p style="color:red">Tên phải nhập</p>
            }
        </div>

        <div class="form-row">
            <label>Email</label>
            <input type="text" formControlName="email" />
            @if (email?.invalid && email?.touched) {
            <p style="color:red">Email phải nhập</p>
            }
        </div>

        <div class="form-row">
            <label>Password</label>
            <input type="text" formControlName="password" />
            @if (password?.invalid && password?.touched) {
            <p style="color:red">Mật khẩu phải >= 6</p>
            }
        </div>

        <button type="submit" class="primary">Dang ky </button>
    </form>
</div>
